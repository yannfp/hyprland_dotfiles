###############################################
#              HYPRLAND CONFIG                #
###############################################

# ── MONITOR ───────────────────────────────────
monitor = ,preferred,auto,auto


# ── VARIABLES ─────────────────────────────────
$terminal    = kitty
$fileManager = thunar
$menu = rofi -show drun -display-drun "󰍉 "
$mainMod     = SUPER


# ── AUTOSTART ─────────────────────────────────
exec-once = waybar
exec-once = hyprpaper


# ── ENVIRONMENT VARIABLES ─────────────────────
env = GTK_THEME,Qogir-Dark
env = ICON_THEME,Papirus-Dark
env = XCURSOR_THEME,Qogir-Dark
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Qogir-Dark
env = HYPRCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = GTK_IM_MODULE,cedilla
env = QT_IM_MODULE,cedilla


###############################################
#             LOOK AND FEEL                   #
###############################################

general {
    gaps_in             = 0
    gaps_out            = 0
    border_size         = 1
    col.active_border   = rgba(a16deeaa)
    col.inactive_border = rgba(595959aa)
    resize_on_border    = false
    allow_tearing       = false
    layout              = dwindle
}

decoration {
    active_opacity   = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled  = true
        size     = 3
        passes   = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = overshot,       0.05, 0.9,  0.1,  1.05
    bezier = linear,         0,    0,    1,    1

    animation = windows,       1, 4,   overshot
    animation = windowsIn,     1, 4,   overshot,     slide
    animation = windowsOut,    1, 4,   overshot,     slide
    animation = border,        1, 5,   easeOutQuint
    animation = fade,          1, 3,   quick
    animation = fadeIn,        1, 2,   almostLinear
    animation = fadeOut,       1, 1.5, almostLinear
    animation = layers,        1, 4,   easeOutQuint
    animation = layersIn,      1, 4,   easeOutQuint, fade
    animation = layersOut,     1, 1.5, linear,       fade
    animation = fadeLayersIn,  1, 2,   almostLinear
    animation = fadeLayersOut, 1, 1.5, almostLinear
    animation = workspaces,    1, 3,   overshot,     slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}


###############################################
#                  INPUT                      #
###############################################

input {
    kb_layout  = us
    kb_variant = intl
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}


###############################################
#               KEYBINDINGS                   #
###############################################

# ── Core ──────────────────────────────────────
bind = $mainMod,       Return,  exec, $terminal
bind = $mainMod,       E,       exec, $fileManager
bind = $mainMod,       D,       exec, $menu 
bind = $mainMod,       F1,      exec, firefox
bind = $mainMod SHIFT, Q,       killactive
bind = $mainMod,       M,       exit
bind = $mainMod,       V,       togglefloating
bind = $mainMod,       F,       fullscreen
bind = $mainMod,       P,       pseudo
bind = $mainMod,       J,       togglesplit
bind = $mainMod,       ESCAPE,  exec, ~/.config/hypr/scripts/powermenu.sh
bind = $mainMod SHIFT, R,       exec, hyprctl reload && killall waybar && waybar
bind = $mainMod, K, exec, pkill -x waybar || waybar &

# ── Screenshot ────────────────────────────────
bind = $mod SHIFT, S,      exec, hyprshot -m region --clipboard-only
bind = $mod SHIFT ALT, S,  exec, hyprshot -m screen --clipboard-only
bind = $mod SHIFT CTRL, S, exec, hyprshot -m window --clipboard-only

# ── Focus ─────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── Workspaces ────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Scratchpad ────────────────────────────────
bind = $mainMod,       Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace,        special:magic

# ── Mouse ─────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Volume ────────────────────────────────────
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+ && dunstify -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')" -h string:x-dunst-stack-tag:audio "Volume"
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && dunstify -h int:value:"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}')" -h string:x-dunst-stack-tag:audio "Volume"
bindle = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && [ "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -o 'MUTED')" = "MUTED" ] && dunstify -h string:x-dunst-stack-tag:audio "Muted" || dunstify -h string:x-dunst-stack-tag:audio "Volume On"
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Brightness ────────────────────────────────
bindle = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+ && dunstify -h int:value:"$(brightnessctl i | grep -oP '\(\K[^%]+')" -h string:x-dunst-stack-tag:brightness "Brightness"
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && dunstify -h int:value:"$(brightnessctl i | grep -oP '\(\K[^%]+')" -h string:x-dunst-stack-tag:brightness "Brightness"

# ── Media ─────────────────────────────────────
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
